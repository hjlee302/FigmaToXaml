<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, Arial, sans-serif;
      font-size: 12px;
    }

    body {
      margin: 0;
      background: var(--figma-color-bg);
      color: var(--figma-color-text);
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      height: 100vh;
      gap: 12px;
      padding: 16px;
      box-sizing: border-box;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 15px;
      line-height: 20px;
      font-weight: 700;
    }

    .status {
      color: var(--figma-color-text-secondary);
      line-height: 18px;
      min-height: 18px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    button {
      height: 32px;
      border: 1px solid var(--figma-color-border);
      border-radius: 6px;
      background: var(--figma-color-bg);
      color: var(--figma-color-text);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--figma-color-bg-brand);
      background: var(--figma-color-bg-brand);
      color: var(--figma-color-text-onbrand);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 0;
      box-sizing: border-box;
      resize: none;
      border: 1px solid var(--figma-color-border);
      border-radius: 6px;
      padding: 10px;
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
      font: 11px/16px Consolas, "SFMono-Regular", monospace;
      white-space: pre;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--figma-color-text-secondary);
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Figma JSON Export</h1>
        <div id="status" class="status">Figma 노드를 JSON으로 변환할 준비 중...</div>
      </div>
    </header>

    <section class="actions">
      <button id="exportSelection" class="primary">선택 영역 Export</button>
      <button id="exportPage">현재 Page Export</button>
    </section>

    <textarea id="output" spellcheck="false" placeholder="Export 결과 JSON이 여기에 표시됩니다."></textarea>

    <section class="footer">
      <button id="copy" disabled>복사</button>
      <button id="download" disabled>다운로드</button>
      <button id="close">닫기</button>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const exportSelectionBtn = document.getElementById('exportSelection');
    const exportPageBtn = document.getElementById('exportPage');
    const copyBtn = document.getElementById('copy');
    const downloadBtn = document.getElementById('download');
    const closeBtn = document.getElementById('close');

    let currentFileName = 'figma-selection.json';
    let selectionCount = 0;

    exportSelectionBtn.onclick = () => {
      setBusy(true);
      parent.postMessage({ pluginMessage: { type: 'export-selection' } }, '*');
    };

    exportPageBtn.onclick = () => {
      setBusy(true);
      parent.postMessage({ pluginMessage: { type: 'export-page' } }, '*');
    };

    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(outputEl.value);
        statusEl.textContent = 'JSON을 클립보드에 복사했습니다.';
      } catch {
        outputEl.select();
        document.execCommand('copy');
        statusEl.textContent = 'JSON을 클립보드에 복사했습니다.';
      }
    };

    downloadBtn.onclick = () => {
      const blob = new Blob([outputEl.value], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = currentFileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      statusEl.textContent = `${currentFileName} 다운로드를 시작했습니다.`;
    };

    closeBtn.onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    onmessage = (event) => {
      const message = event.data.pluginMessage;
      if (!message) return;

      if (message.type === 'ready') {
        selectionCount = message.selectionCount;
        statusEl.textContent = `${message.pageName} / 선택된 노드 ${selectionCount}개`;
        updateSelectionButton();
      }

      if (message.type === 'selection-change') {
        selectionCount = message.selectionCount;
        statusEl.textContent = `선택된 노드 ${selectionCount}개`;
        updateSelectionButton();
      }

      if (message.type === 'export-result') {
        currentFileName = message.fileName;
        outputEl.value = message.json;
        copyBtn.disabled = false;
        downloadBtn.disabled = false;
        setBusy(false);
        statusEl.textContent = `${currentFileName} 생성 완료`;
      }

      if (message.type === 'export-error') {
        setBusy(false);
        statusEl.textContent = message.message;
      }
    };

    function setBusy(isBusy) {
      exportSelectionBtn.disabled = isBusy || selectionCount === 0;
      exportPageBtn.disabled = isBusy;
      statusEl.textContent = isBusy ? 'JSON 생성 중...' : statusEl.textContent;
    }

    function updateSelectionButton() {
      exportSelectionBtn.disabled = selectionCount === 0;
    }
  </script>
</body>
</html>
